<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font: 13px system-ui; width: 280px; padding: 14px; margin: 0; color: #16203a; }
      h1 { font-size: 14px; margin: 0 0 10px; }
      label { display: block; font-weight: 700; font-size: 11px; color: #42506b; margin: 8px 0 4px; }
      input { width: 100%; box-sizing: border-box; padding: 8px 10px; border: 1px solid #e3e8f0; border-radius: 8px; font: inherit; }
      button { margin-top: 12px; width: 100%; padding: 9px; background: #2a6fdb; color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
      .ok { color: #16a34a; font-weight: 700; font-size: 12px; margin-top: 8px; min-height: 16px; }
    </style>
  </head>
  <body>
    <h1>ScoutforU — Resdex Import</h1>
    <label>ATS URL</label>
    <input id="baseUrl" placeholder="https://scoutforu-ats.vercel.app" />
    <label>Import token (Admin → Resume Import Token)</label>
    <input id="token" placeholder="sfu_…" />
    <button id="save">Save</button>
    <div class="ok" id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
